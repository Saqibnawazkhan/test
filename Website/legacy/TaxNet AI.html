<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>TaxNet AI — Graph Intelligence for the National Tax Net</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Sora:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
:root {
  --bg-0: #0A0E15;
  --bg-1: #0D121B;
  --bg-2: #111722;
  --panel: rgba(255,255,255,0.025);
  --panel-2: rgba(255,255,255,0.045);
  --panel-border: rgba(255,255,255,0.08);
  --panel-border-2: rgba(255,255,255,0.13);
  --green: #25C98C;
  --green-2: #3DD89E;
  --green-glow: rgba(37,201,140,0.22);
  --blue: #4C8DF6;
  --blue-2: #7AAAF8;
  --cyan: #38BDD8;
  --violet: #8B86E0;
  --text: #E6ECF4;
  --text-2: #9AA7BA;
  --text-3: #647387;
  --low: #25C98C;
  --med: #E0B23C;
  --high: #E68A4A;
  --critical: #E5566F;
  --r-sm: 8px;
  --r-md: 11px;
  --r-lg: 14px;
  --r-xl: 18px;
  --shadow-glow: 0 0 28px -14px var(--green-glow);
  --shadow-card: 0 1px 2px rgba(0,0,0,0.3), 0 8px 24px -16px rgba(0,0,0,0.6);
  --font-display: 'Space Grotesk', system-ui, sans-serif;
  --font-body: 'Sora', system-ui, sans-serif;
  --font-mono: 'JetBrains Mono', ui-monospace, monospace;
}

[data-theme="light"] {
  --bg-0: #EDF1F6;
  --bg-1: #F4F7FB;
  --bg-2: #FFFFFF;
  --panel: rgba(12,22,40,0.022);
  --panel-2: rgba(12,22,40,0.04);
  --panel-border: rgba(12,22,40,0.10);
  --panel-border-2: rgba(12,22,40,0.16);
  --text: #101926;
  --text-2: #495568;
  --text-3: #7A8799;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body {
  font-family: var(--font-body);
  background: var(--bg-0);
  color: var(--text);
  overflow: hidden;
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
}
#root { height: 100vh; width: 100vw; }

::selection { background: rgba(37,201,140,0.28); color: var(--text); }

/* Scrollbars */
::-webkit-scrollbar { width: 10px; height: 10px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 20px; border: 2px solid transparent; background-clip: padding-box; }
::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.16); background-clip: padding-box; }

/* ===== App layout ===== */
.app-shell {
  display: grid;
  grid-template-columns: 256px 1fr;
  height: 100vh;
  position: relative;
  background:
    radial-gradient(1100px 600px at 80% -15%, rgba(76,141,246,0.055), transparent 62%),
    radial-gradient(900px 700px at 5% 115%, rgba(37,201,140,0.04), transparent 58%),
    var(--bg-0);
  transition: background .4s ease;
}

/* ===== Sidebar ===== */
.sidebar {
  background: linear-gradient(180deg, var(--bg-1), var(--bg-0));
  border-right: 1px solid var(--panel-border);
  display: flex;
  flex-direction: column;
  padding: 22px 16px;
  gap: 6px;
  z-index: 40;
  position: relative;
}
.brand { display: flex; align-items: center; gap: 12px; padding: 4px 8px 22px; }
.brand-mark {
  width: 36px; height: 36px; border-radius: 9px; flex: none;
  background: linear-gradient(135deg, var(--green), var(--blue));
  display: grid; place-items: center;
  box-shadow: 0 0 14px -6px var(--green-glow);
  position: relative; overflow: hidden;
}
.brand-mark svg { width: 22px; height: 22px; }
.brand-name { font-family: var(--font-display); font-weight: 700; font-size: 18px; letter-spacing: -0.02em; line-height: 1; }
.brand-name span { color: var(--green); }
.brand-sub { font-size: 10px; letter-spacing: 0.18em; color: var(--text-3); text-transform: uppercase; margin-top: 4px; font-family: var(--font-mono); }

.nav-label { font-size: 10px; letter-spacing: 0.16em; color: var(--text-3); text-transform: uppercase; padding: 14px 12px 6px; font-family: var(--font-mono); }
.nav-item {
  display: flex; align-items: center; gap: 12px;
  padding: 10px 12px; border-radius: var(--r-sm);
  color: var(--text-2); font-size: 13.5px; font-weight: 500;
  cursor: pointer; position: relative; transition: all .16s ease;
  border: 1px solid transparent;
}
.nav-item svg { width: 18px; height: 18px; flex: none; opacity: .85; }
.nav-item:hover { background: var(--panel); color: var(--text); }
.nav-item.active {
  background: var(--panel-2);
  color: var(--text); border-color: var(--panel-border);
}
.nav-item.active::before {
  content:''; position: absolute; left: -16px; top: 50%; transform: translateY(-50%);
  width: 3px; height: 18px; border-radius: 0 3px 3px 0; background: var(--green);
}
.nav-item.active svg { opacity: 1; color: var(--green); }
.nav-badge { margin-left: auto; font-size: 10px; font-family: var(--font-mono); background: rgba(229,86,111,0.16); color: var(--critical); padding: 1px 7px; border-radius: 20px; font-weight: 600; }

.sidebar-foot { margin-top: auto; padding-top: 14px; border-top: 1px solid var(--panel-border); }
.user-chip { display: flex; align-items: center; gap: 10px; padding: 8px; border-radius: var(--r-sm); cursor: pointer; }
.user-chip:hover { background: var(--panel); }
.avatar { width: 34px; height: 34px; border-radius: 9px; background: linear-gradient(135deg,var(--blue),var(--violet)); display: grid; place-items: center; font-weight: 700; font-size: 13px; color: #fff; flex: none; }

/* ===== Main ===== */
.main { display: flex; flex-direction: column; min-width: 0; height: 100vh; }
.topbar {
  height: 60px; flex: none; display: flex; align-items: center; gap: 16px;
  padding: 0 22px; border-bottom: 1px solid var(--panel-border);
  background: rgba(13,18,27,0.6); backdrop-filter: blur(18px); -webkit-backdrop-filter: blur(18px);
  z-index: 30;
}
[data-theme="light"] .topbar { background: rgba(255,255,255,0.6); }
.crumb { font-family: var(--font-mono); font-size: 12px; color: var(--text-3); letter-spacing: 0.04em; white-space: nowrap; flex: none; }
.crumb b { color: var(--text); font-weight: 600; }

.search-box {
  flex: 1; max-width: 460px; display: flex; align-items: center; gap: 10px;
  background: var(--panel); border: 1px solid var(--panel-border); border-radius: 11px;
  padding: 9px 14px; transition: all .18s ease; cursor: text;
}
.search-box:focus-within { border-color: rgba(76,141,246,0.45); box-shadow: 0 0 0 3px rgba(76,141,246,0.09); background: var(--panel-2); }
.search-box input { background: none; border: none; outline: none; color: var(--text); font-family: var(--font-body); font-size: 13.5px; width: 100%; }
.search-box input::placeholder { color: var(--text-3); }
.search-box svg { width: 16px; height: 16px; color: var(--text-3); flex: none; }
.kbd { font-family: var(--font-mono); font-size: 10px; color: var(--text-3); border: 1px solid var(--panel-border); border-radius: 5px; padding: 2px 6px; }

.topbar-actions { display: flex; align-items: center; gap: 8px; margin-left: auto; }
.icon-btn {
  width: 38px; height: 38px; border-radius: 10px; display: grid; place-items: center;
  background: var(--panel); border: 1px solid var(--panel-border); color: var(--text-2);
  cursor: pointer; transition: all .16s ease; position: relative;
}
.icon-btn:hover { color: var(--text); border-color: var(--panel-border-2); background: var(--panel-2); }
.icon-btn svg { width: 18px; height: 18px; }
.icon-btn .dot { position: absolute; top: 8px; right: 9px; width: 6px; height: 6px; border-radius: 50%; background: var(--critical); border: 1.5px solid var(--bg-1); }
.lang-toggle { display: flex; background: var(--panel); border: 1px solid var(--panel-border); border-radius: 9px; padding: 3px; }
.lang-toggle button { background: none; border: none; color: var(--text-3); font-family: var(--font-mono); font-size: 11px; font-weight: 600; padding: 5px 9px; border-radius: 6px; cursor: pointer; transition: all .15s; }
.lang-toggle button.active { background: var(--panel-2); color: var(--text); box-shadow: inset 0 0 0 1px var(--panel-border-2); }

.content { flex: 1; overflow-y: auto; overflow-x: hidden; position: relative; }
.page { padding: 28px 32px 60px; max-width: 1480px; margin: 0 auto; animation: pageIn .5s cubic-bezier(.2,.7,.2,1); }
/* transform-only reveal: content stays visible even if the compositor pauses animations */
@keyframes pageIn { from { transform: translateY(14px); } to { transform: none; } }
@keyframes fadeRise { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: none; } }

/* ===== Reusable ===== */
.glass {
  background: var(--panel); border: 1px solid var(--panel-border); border-radius: var(--r-lg);
  backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
}
.card { background: var(--panel); border: 1px solid var(--panel-border); border-radius: var(--r-lg); padding: 20px; position: relative; transition: border-color .2s, transform .2s; box-shadow: var(--shadow-card); }
.card:hover { border-color: var(--panel-border-2); }
.page-head { display: flex; align-items: flex-end; justify-content: space-between; gap: 20px; margin-bottom: 24px; flex-wrap: wrap; }
.page-title { font-family: var(--font-display); font-size: 26px; font-weight: 600; letter-spacing: -0.02em; }
.page-desc { color: var(--text-2); font-size: 13.5px; margin-top: 6px; max-width: 620px; line-height: 1.5; }
.eyebrow { font-family: var(--font-mono); font-size: 10.5px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--text-3); display: inline-flex; align-items: center; gap: 8px; margin-bottom: 11px; }
.eyebrow::before { content:''; width: 18px; height: 1px; background: var(--green); }

.btn {
  display: inline-flex; align-items: center; gap: 9px; padding: 10px 16px;
  border-radius: 9px; font-family: var(--font-body); font-size: 13px; font-weight: 600;
  cursor: pointer; border: 1px solid transparent; transition: all .18s ease; white-space: nowrap;
}
.btn svg { width: 16px; height: 16px; }
.btn-primary { background: var(--green); color: #08130E; box-shadow: var(--shadow-glow); }
.btn-primary:hover { background: var(--green-2); }
.btn-ghost { background: var(--panel); border-color: var(--panel-border); color: var(--text); }
.btn-ghost:hover { border-color: var(--panel-border-2); background: var(--panel-2); }
.btn-blue { background: var(--blue); color: #fff; }
.btn-blue:hover { background: var(--blue-2); }

.tag { display: inline-flex; align-items: center; gap: 6px; font-family: var(--font-mono); font-size: 10.5px; font-weight: 500; padding: 4px 9px; border-radius: 6px; }
.tag-low { background: rgba(37,201,140,0.12); color: var(--green); }
.tag-med { background: rgba(224,178,60,0.12); color: var(--med); }
.tag-high { background: rgba(230,138,74,0.13); color: var(--high); }
.tag-critical { background: rgba(229,86,111,0.13); color: var(--critical); }
.tag-info { background: rgba(76,141,246,0.12); color: var(--blue-2); }

.dot-pulse { width: 7px; height: 7px; border-radius: 50%; background: var(--green); position: relative; }
.dot-pulse::after { content:''; position: absolute; inset: -4px; border-radius: 50%; border: 1px solid var(--green); animation: ping 1.8s ease-out infinite; }
@keyframes ping { 0% { transform: scale(.6); opacity: 1; } 100% { transform: scale(2.2); opacity: 0; } }

.divider { height: 1px; background: var(--panel-border); margin: 18px 0; }
.mono { font-family: var(--font-mono); }
.grid { display: grid; gap: 18px; }

/* Slide-in panels */
.drawer-scrim { position: fixed; inset: 0; background: rgba(6,9,14,0.6); backdrop-filter: blur(3px); z-index: 90; }
@keyframes fade { from { opacity: 0; } to { opacity: 1; } }
.drawer {
  position: fixed; top: 0; right: 0; height: 100vh; width: 440px; max-width: 92vw; z-index: 100;
  background: linear-gradient(180deg, var(--bg-1), var(--bg-0));
  border-left: 1px solid var(--panel-border-2); box-shadow: -30px 0 80px -30px rgba(0,0,0,0.7);
  animation: slideIn .32s cubic-bezier(.2,.8,.2,1); display: flex; flex-direction: column;
}
@keyframes slideIn { from { transform: translateX(44px); } to { transform: none; } }
.drawer-head { padding: 20px 22px; border-bottom: 1px solid var(--panel-border); display: flex; align-items: center; justify-content: space-between; }
.drawer-body { overflow-y: auto; padding: 22px; flex: 1; }

/* Tooltip */
.fade-up { animation: pageIn .5s cubic-bezier(.2,.7,.2,1) both; }

/* Mobile */
.mobile-bar { display: none; }
@media (max-width: 920px) {
  .app-shell { grid-template-columns: 1fr; }
  .sidebar { position: fixed; left: 0; top: 0; height: 100vh; width: 256px; transform: translateX(-100%); transition: transform .3s; box-shadow: 30px 0 80px -30px rgba(0,0,0,0.8); }
  .sidebar.open { transform: none; }
  .mobile-bar { display: flex; }
  .search-box { display: none; }
  .page { padding: 20px 16px 80px; }
  .topbar { padding: 0 14px; }
}

[hidden] { display: none !important; }
</style>
</head>

<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>

<script type="text/babel" src="icons.jsx"></script>
<script type="text/babel" src="data.jsx"></script>

<script type="text/babel" src="graph.jsx"></script>

<script type="text/babel" src="views-detail.jsx"></script>
<script type="text/babel" src="app.jsx"></script>
