# Codemagic CI/CD — builds the TaxNet Flutter app for iOS, signs it with your
# Apple Developer account, and uploads it to TestFlight (then optionally the App Store).
# The Flutter project lives in the flutter_app/ subfolder, so every step cd's into it.
# Docs: https://docs.codemagic.io/yaml-quick-start/building-a-flutter-app/
workflows:
  ios-appstore:
    name: TaxNet iOS — TestFlight
    instance_type: mac_mini_m2
    max_build_duration: 90

    # References the App Store Connect API key you add in the Codemagic UI.
    # The name here MUST match the key name you give it in Codemagic
    # (Team settings → Integrations → App Store Connect → add key → name it "taxnet_appstore").
    integrations:
      app_store_connect: taxnet_appstore

    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.taxnet.taxnetApp
      flutter: stable      # Codemagic uses a modern Flutter — your local 3.27.4 doesn't matter
      xcode: latest        # modern Xcode → satisfies Apple's iOS-18-SDK upload requirement
      cocoapods: default
      vars:
        BUNDLE_ID: "com.taxnet.taxnetApp"

    cache:
      cache_paths:
        - $HOME/.pub-cache

    scripts:
      - name: Set up code signing for the Xcode project
        script: |
          cd flutter_app
          xcode-project use-profiles
      - name: Get Flutter packages
        script: |
          cd flutter_app
          flutter pub get
      - name: Install CocoaPods dependencies
        script: |
          cd flutter_app/ios
          pod install
      - name: Build signed IPA
        script: |
          cd flutter_app
          flutter build ipa --release \
            --build-name=1.0.0 \
            --build-number=$BUILD_NUMBER \
            --export-options-plist=/Users/builder/export_options.plist

    artifacts:
      - flutter_app/build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        auth: integration
        # Uploads the build to TestFlight automatically after a successful build.
        submit_to_testflight: true
        # When you're ready for the PUBLIC App Store, set this to true (and create
        # the app's store listing + screenshots in App Store Connect first):
        # submit_to_app_store: false
      email:
        recipients:
          - saqib055nawaz@gmail.com
        notify:
          success: true
          failure: true
